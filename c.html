<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Checkout Page</title>
    <style>
        body {
            background: radial-gradient(circle at center, #4b2a8e 0%, #1a0b33 100%);
        }

       .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
}

.modal.active {
    opacity: 1;
    pointer-events: all;
}

.modal-box {
    background: #140021;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 300px;
    transform: scale(0.8);
    transition: 0.3s;
    box-shadow: 0 0 30px rgba(128, 37, 255, 0.4);
}

.modal.active .modal-box {
    transform: scale(1);
}

/* Loading */
.spinner {
    border: 5px solid #333;
    border-top: 5px solid #7b2ff7;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    margin: 0 auto 15px auto;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* SUCCESS STYLE (สำคัญ) */
.success {
    display: none;
    text-align: center;
    color: #00ff99;
    font-size: 18px;
    font-weight: bold;
    animation: pop 0.4s ease;
}

.success span {
    font-size: 60px;
    display: block;
    margin-bottom: 10px;
    color: #00ff99;
    text-shadow: 0 0 15px #00ff99;
}

@keyframes pop {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

        
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="relative w-full max-w-5xl">
        
        <div class="absolute -left-12 top-10 md:block hidden">
            <a href="index.html" class="text-white hover:text-purple-300 transition-all inline-block cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-10 h-10">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3" />
                </svg>
            </a>
        </div>

        <div class="bg-[#3e1f75]/80 backdrop-blur-md p-8 md:p-12 rounded-2xl shadow-2xl border border-white/10 text-white">
            <form id="checkoutForm" action="index.html" method="GET">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
                    
                    <div>
                        <h2 class="text-2xl font-bold mb-8 tracking-wide">BILLING ADDRESS</h2>
                        
                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-medium mb-1.5">Full Name :</label>
                                <input type="text" name="fullname" placeholder="Thee Theerakit K.Lee" class="w-full bg-[#2a1452] border border-white/20 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder:text-gray-400" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-1.5">Email :</label>
                                <input type="email" name="email" placeholder="Thee Theerakit K.Lee" class="w-full bg-[#2a1452] border border-white/20 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder:text-gray-400" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-1.5">Address :</label>
                                <input type="text" name="address" placeholder="Room - Street - Location" class="w-full bg-[#2a1452] border border-white/20 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder:text-gray-400" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-1.5">City :</label>
                                <input type="text" name="city" placeholder="Xaysettha" class="w-full bg-[#2a1452] border border-white/20 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder:text-gray-400" required>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium mb-1.5">Country :</label>
                                    <input type="text" name="country" placeholder="Lao PDR" class="w-full bg-[#2a1452] border border-white/20 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder:text-gray-400" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1.5">Zip Code :</label>
                                    <input type="text" name="zipcode" placeholder="123 456" class="w-full bg-[#2a1452] border border-white/20 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder:text-gray-400" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h2 class="text-2xl font-bold mb-8 tracking-wide">PAYMENT</h2>
                        
                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-medium mb-3">Cards Accepted :</label>
                                <div class="flex gap-3">
                                    <div class="bg-white px-2 py-1 rounded shadow-sm"><img src="https://upload.wikimedia.org/wikipedia/commons/d/d6/Visa_2021.svg" class="h-5" alt="Visa"></div>
                                    <div class="bg-white px-2 py-1 rounded shadow-sm"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" class="h-5" alt="PayPal"></div>
                                    <div class="bg-white px-2 py-1 rounded shadow-sm"><img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" class="h-5" alt="Mastercard"></div>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-1.5">Name On Card :</label>
                                <input type="text" name="cardname" placeholder="Mr. K Lee" class="w-full bg-[#2a1452] border border-white/20 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder:text-gray-400" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-1.5">Credit Card Number :</label>
                                <input type="text" name="cardnumber" placeholder="1111 2222 3333 4444" class="w-full bg-[#2a1452] border border-white/20 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder:text-gray-400" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-1.5">Exp. Month :</label>
                                <input type="text" name="expmonth" placeholder="April" class="w-full bg-[#2a1452] border border-white/20 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder:text-gray-400" required>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium mb-1.5">Exp. Year :</label>
                                    <input type="text" name="expyear" placeholder="2026" class="w-full bg-[#2a1452] border border-white/20 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder:text-gray-400" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1.5">CVV :</label>
                                    <input type="password" name="cvv" placeholder="123" class="w-full bg-[#2a1452] border border-white/20 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder:text-gray-400" required>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="w-full mt-12 bg-gradient-to-r from-[#8025ff] to-[#be3eff] hover:from-[#9045ff] hover:to-[#c55aff] text-white font-bold py-3.5 rounded-xl text-lg shadow-[0_0_20px_rgba(128,37,255,0.4)] transition-all duration-300 active:scale-[0.98]">
                    Submit
                </button>
                
            </form>
        </div>
    </div>


    <div class="modal" id="modal">
    <div class="modal-box">
        <div id="loading">
            <div class="spinner"></div>
            <p>Processing payment...</p>
        </div>

        <div id="success" class="success">
            ✔
            <p style="font-size:18px;">Payment Successful</p>
        </div>
    </div>
</div>

    <!-- ເນື້ອຫາ checkout ທັງໝົດຢູ່ທາງເທິງ -->

    <script>
    const form = document.getElementById("checkoutForm");
    const modal = document.getElementById("modal");
    const loading = document.getElementById("loading");
    const success = document.getElementById("success");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        modal.classList.add("active");

        loading.style.display = "block";
        success.style.display = "none";

        setTimeout(() => {
            loading.style.display = "none";
            success.style.display = "block";

            setTimeout(() => {
                window.location.href = "index.html";
            }, 2000);

        }, 2500);
    });
    </script>

</body>
</html>

</body>
</html>
